name: api-test-gateway

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: build
    command: sh -c "npm run migrate && npm run dev"
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '${API_HOST_PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway_dev_password
      POSTGRES_DB: gateway
    ports:
      - '${DB_HOST_PORT:-5432}:5432'
    volumes:
      - gateway-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gateway -d gateway']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  gateway-db-data:
