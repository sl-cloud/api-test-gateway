name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gateway
          POSTGRES_PASSWORD: gateway_ci_password
          POSTGRES_DB: gateway
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gateway -d gateway"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://gateway:gateway_ci_password@localhost:5432/gateway
      JWT_SECRET: ci_test_secret_at_least_32_characters_long
      LOG_LEVEL: silent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # The npm version bundled with actions/setup-node's Node 20 mishandles
      # optional platform-specific packages (esbuild's per-OS/CPU binaries)
      # during npm ci; upgrading npm first avoids EBADPLATFORM false positives.
      - run: npm install -g npm@11

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Apply migrations
        run: npm run migrate

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

  docker:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/sl-cloud/api-test-gateway:sha-${{ github.sha }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
